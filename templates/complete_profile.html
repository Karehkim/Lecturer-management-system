<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Profile - Lecturer Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 0;
    background: url(/static/image/login_bg.jpg) no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.wrapper {
    width: 500px;
    max-width: 95%;
    background: rgba(0, 0, 0, 0.85);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    position: relative;
}

.form-section {
    width: 100%;
    padding: 50px;
    box-sizing: border-box;
    text-align: center;
}

/* Project title and subtitle */
.project-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 5px;
}

.project-subtitle {
    font-size: 16px;
    color: #bb86fc;
    margin-bottom: 25px;
}

h2 {
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 18px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 6px;
}

input, select {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #6200ea;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #3700b3;
}

.flashes {
    list-style: none;
    padding: 0;
    margin-bottom: 15px;
}

.flashes li {
    background-color: #f44336;
    padding: 10px;
    border-radius: 4px;
    margin-bottom: 8px;
    text-align: center;
}
</style>
</head>
<body>

<div class="wrapper">

    <div class="form-section">

        <!-- Project Name -->
        <div class="project-header">
            <div class="project-title">Lecturer Management System</div>
            <div class="project-subtitle"><i>Efficiently manage lectures and courses</i></div>
        </div>

        <h2>Complete Your Profile</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flashes">
                    {% for category, message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ lecturer.name if lecturer else '' }}" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ lecturer.email if lecturer else '' }}" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ lecturer.phone if lecturer else '' }}">
            </div>

            <div class="form-group">
                <label>Department</label>
                <select name="department_id" required>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if lecturer and lecturer.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">Save Profile</button>
        </form>

    </div>

</div>

</body>
</html>
